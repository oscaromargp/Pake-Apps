name: Build Pake Apps (NexusOS, Spotify, WhatsApp)

on:
  workflow_dispatch:

jobs:
  build-nexusos:
    name: Build NexusOS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm install 2>&1
      - name: Build CLI
        shell: pwsh
        run: |
          pnpm run cli:build 2>&1
      - name: Build NexusOS App
        shell: pwsh
        run: |
          $env:PAKE_CREATE_APP = "1"
          node dist/cli.js https://nexus-os-chi.vercel.app --name NexusOS 2>&1
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: NexusOS
          path: src-tauri/target/**/*.msi

  build-spotify:
    name: Build Spotify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm install 2>&1
      - name: Build CLI
        shell: pwsh
        run: |
          pnpm run cli:build 2>&1
      - name: Build Spotify App
        shell: pwsh
        run: |
          $env:PAKE_CREATE_APP = "1"
          node dist/cli.js https://open.spotify.com --name Spotify 2>&1
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: Spotify
          path: src-tauri/target/**/*.msi

  build-whatsapp:
    name: Build WhatsApp
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        shell: pwsh
        run: |
          pnpm install 2>&1
      - name: Build CLI
        shell: pwsh
        run: |
          pnpm run cli:build 2>&1
      - name: Build WhatsApp App
        shell: pwsh
        run: |
          $env:PAKE_CREATE_APP = "1"
          node dist/cli.js https://web.whatsapp.com --name WhatsApp 2>&1
      - name: Upload MSI
        uses: actions/upload-artifact@v4
        with:
          name: WhatsApp
          path: src-tauri/target/**/*.msi
