name: Build Pake Apps (NexusOS, Spotify, WhatsApp)

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build-nexusos:
    name: Build NexusOS
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          url: "https://nexus-os-chi.vercel.app"
          name: "NexusOS"

  build-spotify:
    name: Build Spotify
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          url: "https://open.spotify.com"
          name: "Spotify"

  build-whatsapp:
    name: Build WhatsApp
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          url: "https://web.whatsapp.com"
          name: "WhatsApp"
